<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureVault - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">

    <div class="vault-bg"></div>

    <div class="auth-container">
        <div class="brand">
            <div class="vault-dial"><div class="vault-dial-inner"></div></div>
            <h1>SecureVault</h1>
            <p class="tagline">Enterprise document storage, locked down.</p>
        </div>

        <form action="/login" method="POST" class="auth-form">
            <h2>Login to your account</h2>

            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Login</button>
        </form>

        <p class="switch-link">Don't have an account? <a href="/register">Register here</a></p>
    </div>

</body>
</html>
